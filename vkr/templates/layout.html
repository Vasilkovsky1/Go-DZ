{{define "layout"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
<header>
    <h1>Mini DEV.to</h1>

    <nav>
        <a href="/">Главная</a>
        <a href="/articles">Статьи</a>
        <a href="/about">О нас</a>
        <a href="/create">Создать статью</a>
        <a href="/contact">Контакты</a>

        {{if .User}}
            <span class="user">Привет, {{.User}}</span>
            <a href="/logout" class="logout">Выйти</a>
        {{else}}
            <a href="/login">Войти</a>
            <a href="/register">Регистрация</a>
        {{end}}
    </nav>
</header>

<main>
    {{template "content" .}}
</main>

<script src="/static/app.js"></script>
</body>
</html>
{{end}}
